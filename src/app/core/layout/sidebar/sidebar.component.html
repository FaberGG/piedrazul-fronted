<aside class="sidebar">
  <h2 class="sidebar__title">Piedrazul</h2>
  <nav class="sidebar__nav">
    @for (item of visibleItems(); track item.path) {
      <a
        [routerLink]="item.path"
        routerLinkActive="sidebar__link--active"
        class="sidebar__link"
      >
        {{ item.label }}
      </a>
    }
  </nav>
</aside>
