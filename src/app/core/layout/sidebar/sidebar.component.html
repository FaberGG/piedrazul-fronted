<aside class="sidebar">
  <div class="sidebar__logo">
    <div class="sidebar__logo-mark">PZ</div>
    <div>
      <h2 class="sidebar__title">PiedraAzul</h2>
      <p class="sidebar__subtitle">Sistema de citas</p>
    </div>
  </div>

  <nav class="sidebar__nav" aria-label="Menu principal">
    @for (item of visibleItems(); track item.path) {
      <a
        [routerLink]="item.path"
        routerLinkActive="sidebar__link--active"
        [routerLinkActiveOptions]="{ exact: item.path === '/agenda' }"
        class="sidebar__link"
      >
        <i [class]="item.iconClass + ' sidebar__icon'" aria-hidden="true"></i>
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>

  <div class="sidebar__footer" aria-label="Menu secundario">
   @for (item of utilityItems; track item.label) {
  <a
    [routerLink]="item.path"
    class="sidebar__link sidebar__link--utility"
  >
    <i [class]="item.iconClass + ' sidebar__icon'" aria-hidden="true"></i>
    <span>{{ item.label }}</span>
  </a>
    }

    <button type="button" class="sidebar__link sidebar__link--button" (click)="logout()">
      <i class="fa-solid fa-right-from-bracket sidebar__icon" aria-hidden="true"></i>
      <span>Cerrar sesion</span>
    </button>
  </div>
</aside>
