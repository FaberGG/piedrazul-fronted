<section class="info-paciente" [formGroup]="form">
  <header class="info-paciente__header">
    <h2 class="info-paciente__title">
      <i class="fa-regular fa-circle-user"></i>
      Informacion del Paciente
    </h2>
  </header>
<div class="info-paciente__content">
  <div class="info-paciente__grid info-paciente__grid--documento">
    <div class="info-paciente__documento-wrapper">
      <app-input-compartido
        formControlName="documento"
        label="Documento"
        inputId="documento"
        placeholder="Ingresa el numero de documento"
        [required]="true"
        iconClass="fa-solid fa-id-card"
        [showTabHint]="haySugerencias()"
        (keyDown)="onDocumentoKeyDown($event)"
        (focused)="onDocumentoFocus()"
        (blurred)="onDocumentoBlur()"
      />

      @if (cargandoSugerencias()) {
        <div class="info-paciente__sugerencias-estado">Buscando pacientes...</div>
      }

      @if (mostrarSugerencias() && haySugerencias()) {
        <ul class="info-paciente__sugerencias" role="listbox" aria-label="Sugerencias de paciente">
          @for (sugerencia of sugerencias(); track sugerencia.id; let i = $index) {
            <li>
              <button
                type="button"
                class="info-paciente__sugerencia"
                [class.info-paciente__sugerencia--active]="indiceActivo() === i"
                (mouseenter)="onHoverSugerencia(i)"
                (click)="seleccionarSugerencia(sugerencia)"
              >
                <span class="info-paciente__sugerencia-nombre">{{ sugerencia.nombresCompletos }}</span>
                <span class="info-paciente__sugerencia-documento">{{ sugerencia.documento }}</span>
              </button>
            </li>
          }
        </ul>
      }
    </div>
  </div>

  <div class="info-paciente__grid">
    <app-input-compartido
      formControlName="nombres"
      label="Nombres"
      inputId="nombres"
      [required]="true"
      placeholder="nombre@correo.com"

    />

    <app-input-compartido
      formControlName="apellidos"
      label="Apellidos"
      inputId="apellidos"
      [required]="true"
      placeholder="nombre@correo.com"

    />

    <app-input-compartido
      formControlName="celular"
      label="Celular"
      inputId="celular"
      [required]="true"
      iconClass="fa-solid fa-mobile-screen"
    />

    <div class="info-paciente__field">
      <label class="info-paciente__label" for="genero">
        Genero
        <span class="info-paciente__required" aria-hidden="true">*</span>
      </label>
      <div class="info-paciente__select-wrapper">
        <i class="fa-solid fa-venus-mars info-paciente__select-icon" aria-hidden="true"></i>
        <select id="genero" class="info-paciente__select" formControlName="genero">
          <option value="">Selecciona genero</option>
          @for (genero of generos; track genero) {
            <option [value]="genero">{{ genero }}</option>
          }
        </select>
      </div>
    </div>

    <app-input-compartido
      formControlName="fechaNacimiento"
      label="Fecha de nacimiento"
      inputId="fechaNacimiento"
      type="date"
      iconClass="fa-regular fa-calendar"
    />

    <app-input-compartido
      formControlName="correo"
      label="Correo electronico"
      inputId="correo"
      type="email"
      iconClass="fa-regular fa-envelope"
      placeholder="nombre@correo.com"
    />
  </div>
</div>
</section>
