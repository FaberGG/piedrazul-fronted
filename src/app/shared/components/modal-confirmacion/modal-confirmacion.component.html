@if (visible) {
  <div class="modal-confirmacion" (click)="onBackdropClick($event)">
    <section class="modal-confirmacion__dialog" role="dialog" aria-modal="true" [attr.aria-label]="titulo">
      <h3 class="modal-confirmacion__title">{{ titulo }}</h3>
      <p class="modal-confirmacion__message">{{ mensaje }}</p>

      <div class="modal-confirmacion__actions">
        <button type="button" class="modal-confirmacion__btn modal-confirmacion__btn--ghost" (click)="cancelar.emit()">
          {{ textoCancelar }}
        </button>
        <button type="button" class="modal-confirmacion__btn modal-confirmacion__btn--primary" (click)="confirmar.emit()">
          {{ textoConfirmar }}
        </button>
      </div>
    </section>
  </div>
}
